# =============================================================================
# ⚠️  WORKFLOW DESATIVADO (disabled em 2026-07-03, via GitHub → Actions → ⋯ →
#     "Disable workflow"). O arquivo é mantido de propósito, como plano B.
#
#     O deploy de produção HOJE é feito pela INTEGRAÇÃO NATIVA da Vercel (a cada
#     push na main). Isso funciona no plano Hobby porque o repositório é PÚBLICO.
#     Este workflow (deploy via CLI + VERCEL_TOKEN) só volta a ser necessário se
#     o repo for tornado PRIVADO — aí a Vercel Hobby bloqueia a integração nativa
#     de repositório de organização.
#
#     Para REATIVAR: GitHub → Actions → "Deploy Vercel (produção)" → "Enable
#     workflow", e desconectar a integração Git nativa na Vercel. Editar este
#     arquivo NÃO reativa — o liga/desliga é pela UI do Actions.
#
#     Obs.: quando rodou (jul/2026) falhou no passo `vercel build` (exit 1;
#     token/IDs OK, pois o `vercel pull` passou). Causa exata não confirmada
#     (o log exige autenticação) — provável diferença de ambiente do runner
#     em relação à Vercel (ex.: versão de Node). Se reativar, checar o log do
#     build e, se for o caso, fixar a versão de Node com actions/setup-node.
# =============================================================================

name: Deploy Vercel (produção)

# Sobe pra produção na Vercel a cada merge/push na main. Usa a CLI da Vercel
# com token (VERCEL_TOKEN) em vez da integração nativa do Git — assim o deploy
# funciona mesmo com o repositório sob uma Organization do GitHub no plano Hobby,
# sem tirar a posse do repo da organização do cliente.
#
# Também dá pra disparar manualmente pela aba Actions (workflow_dispatch).

on:
  push:
    branches: [main]
  workflow_dispatch:

# Evita deploys concorrentes; se um novo push chegar, cancela o anterior em andamento.
concurrency:
  group: vercel-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Instala a CLI da Vercel
        run: npm install --global vercel@latest

      # Puxa as variáveis de ambiente e configs de produção do projeto na Vercel.
      # Assim os segredos (Supabase, Resend, GTM…) ficam só na Vercel — não
      # precisam ser duplicados nos secrets do GitHub.
      - name: Puxa configs de produção da Vercel
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build de produção
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy do build pra produção
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
